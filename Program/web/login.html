<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Tracking Data System - Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="bg-overlay"></div>

    <div class="login-wrapper">
        <!-- Logo Card -->
        <div class="logo-section">
            <img src="login.png" alt="App Logo" class="logo-img" />
            <h1 class="app-title">Production Tracking</h1>
            <p class="app-subtitle">Data System</p>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <h2 class="login-title">Sign In</h2>
            <p class="login-desc">Enter your credentials to continue</p>

            <div id="error-msg" class="error-msg hidden">
                ❌ Invalid username or password
            </div>

            <div class="form-group">
                <label for="username">👤 Username</label>
                <input type="text" id="username" placeholder="Enter username" autocomplete="off" />
            </div>

            <div class="form-group">
                <label for="password">🔒 Password</label>
                <input type="password" id="password" placeholder="Enter password" />
            </div>

            <button class="login-btn" id="loginBtn" onclick="doLogin()">
                <span id="btn-text">Login</span>
            </button>

            <p class="version-text">v1.0.0 &nbsp;|&nbsp; ProTrackSys</p>
        </div>
    </div>

    <script type="text/javascript" src="/eel.js"></script>
    <script src="login.js"></script>
</body>
</html>
